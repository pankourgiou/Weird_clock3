<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chronos Obscura</title>
  <link href="https://fonts.googleapis.com/css2?family=Philosopher:ital@0;1&family=Philosopher:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #04060a;
      --shell-a:  #0a0c10;
      --shell-b:  #060810;
      --face:     #070912;
      --silver:   #8fa8c8;
      --sil-lt:   #c8ddf5;
      --sil-dm:   #2a3a50;
      --crimson:  #9b1f3a;
      --crim-lt:  #d42a50;
      --gold:     #c8a040;
      --glow-s:   rgba(143,168,200,0.18);
      --glow-c:   rgba(155,31,58,0.14);
      --hand:     #dce8f5;
      --second:   #9b1f3a;
    }

    html, body {
      width:100%; height:100%;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; user-select: none;
      font-family: 'Philosopher', serif;
    }

    /* ── woven grid bg ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      opacity: 0.03;
      background-image:
        repeating-linear-gradient(0deg,   transparent, transparent 30px, rgba(143,168,200,1) 30px, rgba(143,168,200,1) 31px),
        repeating-linear-gradient(90deg,  transparent, transparent 30px, rgba(143,168,200,1) 30px, rgba(143,168,200,1) 31px),
        repeating-linear-gradient(45deg,  transparent, transparent 20px, rgba(155,31,58,0.5) 20px, rgba(155,31,58,0.5) 21px),
        repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(155,31,58,0.5) 20px, rgba(155,31,58,0.5) 21px);
    }

    /* ── floating motes ── */
    .mote {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      animation: mote-drift var(--md) ease-in-out infinite alternate;
    }
    @keyframes mote-drift {
      from { transform: translate(0,0); opacity: var(--mlo); }
      to   { transform: translate(var(--mx),var(--my)); opacity: var(--mhi); }
    }

    /* ── keyframes ── */
    @keyframes spin       { to { transform: rotate(360deg);  } }
    @keyframes spinR      { to { transform: rotate(-360deg); } }
    @keyframes breathe    { 0%,100%{opacity:.15} 50%{opacity:.32} }
    @keyframes fadeUp     { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
    @keyframes hourGlow   { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }
    @keyframes rimFlicker { 0%,100%{opacity:.6} 47%{opacity:.9} 53%{opacity:.5} }

    .clock-wrap {
      position: relative; z-index: 1;
      width: min(84vmin, 530px);
      height: min(84vmin, 530px);
      display: flex; align-items: center; justify-content: center;
    }

    /* spinning halos */
    .halo {
      position: absolute; border-radius: 50%;
      top:50%; left:50%; transform: translate(-50%,-50%);
    }
    .halo-1 {
      width:110%; height:110%;
      border: 1px solid rgba(143,168,200,0.12);
      border-top-color: rgba(143,168,200,0.45);
      animation: spin 55s linear infinite;
    }
    .halo-2 {
      width:116%; height:116%;
      border: 1px dashed rgba(155,31,58,0.12);
      border-bottom-color: rgba(155,31,58,0.35);
      animation: spinR 80s linear infinite;
    }
    .halo-3 {
      width:122%; height:122%;
      border: 1px solid rgba(200,160,64,0.07);
      border-left-color: rgba(200,160,64,0.22);
      animation: spin 130s linear infinite;
    }

    /* halo jewels */
    .jewel {
      position: absolute; border-radius: 50%;
      top: 50%; left: 50%;
      transform-origin: 0 0;
    }

    /* outer shell */
    .shell {
      position: absolute; inset: 0; border-radius: 50%;
      background: conic-gradient(
        #0d1018 0deg, #141820 30deg, #0d1018 60deg,
        #111520 90deg, #0d1018 120deg, #141820 150deg,
        #0d1018 180deg, #111520 210deg, #0d1018 240deg,
        #141820 270deg, #0d1018 300deg, #111520 330deg, #0d1018 360deg
      );
      box-shadow:
        0 0 0 2px var(--sil-dm),
        0 0 0 4px #060810,
        0 0 80px rgba(143,168,200,0.22),
        0 0 160px rgba(143,168,200,0.07),
        inset 0 0 60px rgba(0,0,0,0.98);
      animation: rimFlicker 8s ease-in-out infinite;
    }

    .aura {
      position: absolute; inset: 0; border-radius: 50%;
      box-shadow: inset 0 0 70px var(--glow-s), 0 0 90px var(--glow-c);
      animation: breathe 8s ease-in-out infinite;
      pointer-events: none;
    }

    /* face */
    .face {
      position: absolute; inset: 5%; border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #111828, #040608 75%);
      border: 1px solid rgba(143,168,200,0.12);
      box-shadow: inset 0 0 70px rgba(0,0,0,0.97), inset 0 0 25px rgba(155,31,58,0.06);
    }

    /* etch rings */
    .etch {
      position: absolute; border-radius: 50%;
      top:50%; left:50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }

    /* symbols */
    .symbols-ring { position: absolute; inset: 7%; border-radius: 50%; }
    .sym {
      position: absolute;
      width: 13%; height: 13%;
      display: flex; align-items: center; justify-content: center;
      left: 50%; top: 50%;
      margin-left: -6.5%; margin-top: -6.5%;
    }
    .sym svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 5px rgba(143,168,200,0.3));
      transition: filter 0.5s;
    }
    .sym.lit svg {
      filter:
        drop-shadow(0 0 10px var(--silver))
        drop-shadow(0 0 22px rgba(155,31,58,0.65))
        drop-shadow(0 0 5px #fff);
      animation: hourGlow 2s ease-in-out infinite;
    }

    /* hands */
    .hands { position: absolute; inset: 0; border-radius: 50%; }
    .hand {
      position: absolute; left:50%; bottom:50%;
      transform-origin: 50% 100%;
      border-radius: 3px 3px 1px 1px;
    }
    .hand-hour {
      width: 2.8px; height: 26%;
      margin-left: -1.4px;
      background: linear-gradient(to top, var(--sil-dm), var(--hand));
      box-shadow: 0 0 10px rgba(220,232,245,0.35);
    }
    .hand-minute {
      width: 1.7px; height: 37%;
      margin-left: -0.85px;
      background: linear-gradient(to top, var(--crimson), var(--hand));
      box-shadow: 0 0 7px rgba(220,232,245,0.22);
    }
    .hand-second {
      width: 1px; height: 41%;
      margin-left: -0.5px;
      background: linear-gradient(to top, transparent, var(--crim-lt));
      box-shadow: 0 0 12px rgba(155,31,58,0.8);
      border-radius: 1px;
    }
    .hand-second::after {
      content: '';
      position: absolute;
      bottom: -14%; left: -2px;
      width: 5px; height: 11%;
      background: var(--crim-lt);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(155,31,58,0.7);
    }

    /* centre jewel */
    .centre {
      position: absolute; left:50%; top:50%;
      width: 14px; height: 14px;
      transform: translate(-50%,-50%);
      z-index: 10;
    }
    .centre-gem {
      width:14px; height:14px; border-radius:50%;
      background: radial-gradient(circle at 35% 28%, var(--sil-lt), var(--silver));
      box-shadow: 0 0 20px rgba(143,168,200,0.9), 0 0 5px rgba(155,31,58,0.5);
      position: relative;
    }
    .centre-gem::after {
      content: '';
      position: absolute; top:50%; left:50%;
      width: 5px; height: 5px;
      background: var(--crimson);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 8px var(--crimson);
    }

    /* info */
    .info-bar {
      margin-top: min(4vmin, 26px);
      z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      opacity: 0;
      animation: fadeUp 1.5s 0.6s forwards;
    }
    .time-digital {
      font-family: 'Philosopher', serif;
      font-size: clamp(1rem, 2.8vmin, 1.3rem);
      color: var(--silver);
      letter-spacing: 0.28em;
      text-shadow: 0 0 22px rgba(143,168,200,0.55);
    }
    .date-text {
      font-family: 'Philosopher', serif;
      font-style: italic;
      font-size: clamp(0.65rem, 1.8vmin, 0.82rem);
      color: var(--sil-dm);
      letter-spacing: 0.18em;
    }
    .sub-label {
      font-size: clamp(0.46rem, 1.2vmin, 0.58rem);
      color: rgba(143,168,200,0.25);
      letter-spacing: 0.42em;
      text-transform: uppercase;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<div class="motes" id="motes"></div>

<div class="clock-wrap" id="clock">
  <!-- halos -->
  <div class="halo halo-1"></div>
  <div class="halo halo-2"></div>
  <div class="halo halo-3"></div>

  <div class="shell"></div>
  <div class="aura"></div>

  <div class="face">
    <div class="etch" style="width:90%;height:90%;border:1px solid rgba(143,168,200,0.08);"></div>
    <div class="etch" style="width:66%;height:66%;border:1px solid rgba(155,31,58,0.07);"></div>
    <div class="etch" style="width:40%;height:40%;border:1px dashed rgba(143,168,200,0.07);"></div>
    <div class="etch" style="width:20%;height:20%;border:1px solid rgba(200,160,64,0.08);"></div>
  </div>

  <canvas id="tickCanvas" style="position:absolute;inset:0;border-radius:50%;pointer-events:none;"></canvas>

  <div class="symbols-ring" id="symbolsRing"></div>

  <div class="hands">
    <div class="hand hand-hour"   id="hourHand"></div>
    <div class="hand hand-minute" id="minuteHand"></div>
    <div class="hand hand-second" id="secondHand"></div>
    <div class="centre"><div class="centre-gem"></div></div>
  </div>
</div>

<div class="info-bar">
  <div class="time-digital" id="digitalTime"></div>
  <div class="date-text"    id="dateText"></div>
  <div class="sub-label">Chronos Obscura · Glyph Engine</div>
</div>

<script>
// ── Motes ──────────────────────────────────────────────────────
(function(){
  const c = document.getElementById('motes');
  const palette = ['rgba(143,168,200,','rgba(155,31,58,','rgba(200,160,64,'];
  for(let i=0;i<50;i++){
    const el = document.createElement('div');
    el.className = 'mote';
    const sz = (Math.random()*2.2+0.5).toFixed(1);
    const col = palette[i%3];
    const mlo = (Math.random()*0.1+0.02).toFixed(2);
    const mhi = (Math.random()*0.28+0.08).toFixed(2);
    const mx  = (Math.random()*50-25).toFixed(1)+'px';
    const my  = (Math.random()*50-25).toFixed(1)+'px';
    const md  = (Math.random()*9+4).toFixed(1)+'s';
    const del = (Math.random()*9).toFixed(1)+'s';
    el.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${col}${mhi});--mlo:${mlo};--mhi:${mhi};--mx:${mx};--my:${my};--md:${md};animation-delay:${del};opacity:${mlo};`;
    c.appendChild(el);
  }
})();

// ── Place symbols ──────────────────────────────────────────────
const ring = document.getElementById('symbolsRing');
SYMBOLS.forEach((svgStr, i) => {
  const a  = (i * 30 - 90) * Math.PI / 180;
  const r  = 42;
  const el = document.createElement('div');
  el.className = 'sym';
  el.id = 'sym' + i;
  el.style.left = (50 + r * Math.cos(a)) + '%';
  el.style.top  = (50 + r * Math.sin(a)) + '%';
  el.innerHTML  = svgStr;
  ring.appendChild(el);
});

// ── Tick canvas ────────────────────────────────────────────────
function drawTicks() {
  const wrap   = document.getElementById('clock');
  const canvas = document.getElementById('tickCanvas');
  const size   = wrap.offsetWidth;
  canvas.width = canvas.height = size;
  const ctx    = canvas.getContext('2d');
  const cx = size/2, cy = size/2, outer = size * 0.455;
  ctx.clearRect(0, 0, size, size);
  for (let i = 0; i < 60; i++) {
    const a     = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isMaj = i % 5 === 0;
    const len   = isMaj ? size * 0.046 : size * 0.022;
    ctx.beginPath();
    ctx.moveTo(cx + (outer - len) * Math.cos(a), cy + (outer - len) * Math.sin(a));
    ctx.lineTo(cx + outer * Math.cos(a),          cy + outer * Math.sin(a));
    if (isMaj) {
      ctx.strokeStyle = 'rgba(143,168,200,0.0)'; // hidden — glyphs sit here
    } else {
      // three-way colour cycle on minor ticks
      const cycle = i % 3;
      ctx.strokeStyle = cycle === 0
        ? 'rgba(143,168,200,0.32)'
        : cycle === 1
          ? 'rgba(155,31,58,0.22)'
          : 'rgba(200,160,64,0.14)';
    }
    ctx.lineWidth = isMaj ? 1.5 : 0.9;
    ctx.stroke();
  }
}
drawTicks();
window.addEventListener('resize', drawTicks);

// ── Clock engine ───────────────────────────────────────────────
const hourHand   = document.getElementById('hourHand');
const minuteHand = document.getElementById('minuteHand');
const secondHand = document.getElementById('secondHand');
const digitalEl  = document.getElementById('digitalTime');
const dateEl     = document.getElementById('dateText');

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
// Unique separator glyphs cycling through the display
const SEPS   = ['∴','⁂','✦','⊕','⋮','✧'];
let   sepIdx = 0;

function pad(n) { return String(n).padStart(2, '0'); }

let lastHour = -1;

function tick() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();

  secondHand.style.transform = `rotate(${(s + ms / 1000) * 6}deg)`;
  minuteHand.style.transform = `rotate(${(m + s / 60) * 6}deg)`;
  hourHand.style.transform   = `rotate(${((h % 12) + m / 60) * 30}deg)`;

  // cycle separator every 10 seconds
  sepIdx = Math.floor(s / 10) % SEPS.length;
  const sep = SEPS[sepIdx];
  const hh  = h % 12 || 12;
  digitalEl.textContent = `${pad(hh)} ${sep} ${pad(m)} ${sep} ${pad(s)}`;
  dateEl.textContent    = `${DAYS[now.getDay()]}  —  ${MONTHS[now.getMonth()]} ${now.getDate()},  ${now.getFullYear()}`;

  // active hour glyph
  const hr = h % 12;
  if (hr !== lastHour) {
    if (lastHour >= 0) {
      const old = document.getElementById('sym' + lastHour);
      if (old) { old.classList.remove('lit'); }
    }
    const cur = document.getElementById('sym' + hr);
    if (cur) { cur.classList.add('lit'); }
    lastHour = hr;
  }
}

tick();
setInterval(tick, 50);
</script>
